<!DOCTYPE html>
<html lang="es">

<head>
  <meta name="description" content="Descargador de videos y audio - Proyecto educativo">
  <meta name="theme-color" content="#111111">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downloader App</title>

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="shortcut icon" href="/favicon.png">

  <link rel="stylesheet" href="/assets/styles/mainv1.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
</head>

<body>
  <div class="wrapper">

    <main id="content" class="content">

      <!-- ===== Buscador ===== -->
      <div id="searchContainer">
        <div class="search-input-wrap">
          <input id="searchInput" placeholder="Buscar video...">

          <button id="clearInput" class="clear-btn">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <button id="searchBtn">
          <i class="fas fa-search"></i> Buscar
        </button>
        <button id="voiceBtn">
          <i class="fas fa-microphone"></i> VOZ
        </button>

        <button id="themeToggleBtn" type="button" aria-label="Cambiar tema">
          <i class="fa-solid fa-arrows-rotate"></i>
        </button>

      </div>

      <p id="searchStatus" style="display:none; margin-top:10px;">
        <i class="fas fa-spinner fa-spin"></i> Buscando...
      </p>

      <!-- ===== Secciones ===== -->
      <div class="sections-bar">

        <a href="#" id="homeSection" class="section-btn">
          <i class="fas fa-house"></i>
          <span>Inicio</span>
        </a>

        <a href="#" id="musicSection" class="section-btn">
          <i class="fas fa-music"></i>
          <span>Música</span>
        </a>

        <a href="#" id="historySection" class="section-btn">
          <i class="fas fa-clock-rotate-left"></i>
          <span>Historial</span>
        </a>

        <a href="#" id="favoritesSection" class="section-btn">
          <i class="fas fa-heart"></i>
          <span>Favoritos</span>
        </a>

        <a href="#" id="downloadsSection" class="section-btn">
          <i class="fas fa-circle-down"></i>
          <span>Descargas</span>
        </a>

        <a href="#" id="profileSection" class="section-btn">
          <i class="fas fa-user"></i>
          <span>Perfil</span>
        </a>

      </div>

      <!-- ===== Historial de búsquedas ===== -->
      <section class="section search-history-section">
        <div id="searchHistoryList" class="search-history-list"></div>
      </section>

      <!-- ===== Reproductor ===== -->
      <div class="video-card">

        <div class="video-wrapper">
          <video id="player" controls autoplay preload="auto"></video>
          <video id="preloadPlayer" style="display:none;"></video>
        </div>

        <div class="video-info">
          <h4 id="videoMainTitle"></h4>
          <h5 id="videoSubTitle"></h5>

          <div class="controller">
            <button type="button" class="control-btn seek-back">
              <i class="fas fa-rotate-left"></i>
            </button>

            <button type="button" id="prevBtn" class="control-btn prev-btn">
              <i class="fas fa-step-backward"></i>
            </button>

            <button id="playPauseBtn" class="control-btn play-btn">
              <i class="fas fa-play"></i>
            </button>

            <button type="button" id="nextBtn" class="control-btn next-btn">
              <i class="fas fa-step-forward"></i>
            </button>

            <button class="control-btn seek-forward">
              <i class="fas fa-rotate-right"></i>
            </button>
          </div>

          <div id="videoLoading" class="video-loading hidden"></div>

          <div id="downloadContainer" class="download-container hidden">
            <button id="downloadVideoBtn">
              <i class="fas fa-download"></i>
              <span>Descargar Video</span>
            </button>

            <button id="downloadAudioBtn">
              <i class="fas fa-music"></i>
              <span>Descargar Audio</span>
            </button>
          </div>

        </div>

      </div>

      <!-- ===== Resultados ===== -->
      <div id="results"></div>

    </main>

  </div>




  <script>

    const themes = {
      azul: {
        "--bg-main": "#081426",
        "--bg-secondary": "#0f1b2d",
        "--bg-tertiary": "#132238",
        "--card-bg": "rgba(19, 34, 56, 0.88)",
        "--card-hover": "rgba(30, 47, 73, 0.96)",
        "--text-primary": "#f8fbff",
        "--text-secondary": "#bfd0e3",
        "--text-muted": "#89a0bb",
        "--accent-primary": "#4f8cff",
        "--accent-secondary": "#7c5cff",
        "--accent-tertiary": "#22d3ee",
        "--gradient-main": "linear-gradient(135deg, #4f8cff 0%, #7c5cff 48%, #22d3ee 100%)",
        "--overlay-main": "radial-gradient(circle at top left, rgba(79, 140, 255, 0.22), transparent 28%), radial-gradient(circle at bottom right, rgba(124, 92, 255, 0.2), transparent 30%), linear-gradient(145deg, #07101d 0%, #0f172a 48%, #081426 100%)"
      },
      morado: {
        "--bg-main": "#0c1220",
        "--bg-secondary": "#141b2d",
        "--bg-tertiary": "#1c2440",
        "--card-bg": "rgba(28, 36, 64, 0.88)",
        "--card-hover": "rgba(38, 48, 83, 0.98)",
        "--text-primary": "#fdf7ff",
        "--text-secondary": "#e9d5ff",
        "--text-muted": "#c4b5fd",
        "--accent-primary": "#8b5cf6",
        "--accent-secondary": "#ec4899",
        "--accent-tertiary": "#a78bfa",
        "--gradient-main": "linear-gradient(135deg, #8b5cf6 0%, #ec4899 52%, #a78bfa 100%)",
        "--overlay-main": "radial-gradient(circle at top left, rgba(139, 92, 246, 0.22), transparent 28%), radial-gradient(circle at bottom right, rgba(236, 72, 153, 0.18), transparent 30%), linear-gradient(145deg, #10091a 0%, #1a102a 48%, #0c1220 100%)"
      },
      verde: {
        "--bg-main": "#071915",
        "--bg-secondary": "#0d221c",
        "--bg-tertiary": "#123028",
        "--card-bg": "rgba(18, 48, 40, 0.9)",
        "--card-hover": "rgba(25, 63, 52, 0.98)",
        "--text-primary": "#f4fff8",
        "--text-secondary": "#d1fae5",
        "--text-muted": "#9ee6c6",
        "--accent-primary": "#22c55e",
        "--accent-secondary": "#10b981",
        "--accent-tertiary": "#84cc16",
        "--gradient-main": "linear-gradient(135deg, #22c55e 0%, #10b981 50%, #84cc16 100%)",
        "--overlay-main": "radial-gradient(circle at top left, rgba(34, 197, 94, 0.2), transparent 26%), radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.18), transparent 30%), linear-gradient(145deg, #05110e 0%, #0b1815 48%, #071915 100%)"
      },
      naranja: {
        "--bg-main": "#1a1008",
        "--bg-secondary": "#23160d",
        "--bg-tertiary": "#312013",
        "--card-bg": "rgba(49, 32, 19, 0.9)",
        "--card-hover": "rgba(66, 43, 26, 0.98)",
        "--text-primary": "#fff9f4",
        "--text-secondary": "#fed7aa",
        "--text-muted": "#fdba74",
        "--accent-primary": "#f97316",
        "--accent-secondary": "#f59e0b",
        "--accent-tertiary": "#fb923c",
        "--gradient-main": "linear-gradient(135deg, #f97316 0%, #f59e0b 52%, #fb923c 100%)",
        "--overlay-main": "radial-gradient(circle at top left, rgba(249, 115, 22, 0.22), transparent 28%), radial-gradient(circle at bottom right, rgba(245, 158, 11, 0.18), transparent 30%), linear-gradient(145deg, #120b06 0%, #1b120b 48%, #1a1008 100%)"
      }
    };

    const themeOrder = Object.keys(themes);
    const root = document.documentElement;
    const themeToggleBtn = document.getElementById("themeToggleBtn");

    function applyTheme(name) {
      const theme = themes[name];
      if (!theme) return;

      Object.entries(theme).forEach(([key, value]) => {
        root.style.setProperty(key, value);
      });

      localStorage.setItem("theme", name);
    }

    function getNextTheme(current) {
      const index = themeOrder.indexOf(current);
      const nextIndex = index === -1 ? 0 : (index + 1) % themeOrder.length;
      return themeOrder[nextIndex];
    }

    let currentTheme = localStorage.getItem("theme") || themeOrder[0];
    applyTheme(currentTheme);

    themeToggleBtn.addEventListener("click", () => {
      currentTheme = getNextTheme(currentTheme);
      applyTheme(currentTheme);
    });



    document.getElementById("homeSection")?.addEventListener("click", (e) => {
      e.preventDefault();
      window.location.href = "/index.html";
    });

    document.getElementById("musicSection")?.addEventListener("click", (e) => {
      e.preventDefault();
      window.location.href = "/musica.html";
    });

    document.getElementById("historySection")?.addEventListener("click", (e) => {
      e.preventDefault();
      window.location.href = "/historial.html";
    });

    document.getElementById("favoritesSection")?.addEventListener("click", (e) => {
      e.preventDefault();
      window.location.href = "/favoritos.html";
    });

    document.getElementById("downloadsSection")?.addEventListener("click", (e) => {
      e.preventDefault();
      window.location.href = "/descargas.html";
    });

    document.getElementById("profileSection")?.addEventListener("click", (e) => {
      e.preventDefault();
      window.location.href = "/perfil.html";
    });
  </script>
  <script type="module" src="/js/main.js" defer></script>
</body>

</html>
